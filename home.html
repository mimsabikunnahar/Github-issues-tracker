<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!-- tailwind & Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font aweasome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css -->
     <link rel="stylesheet" href="style.css">
  <title>HomePage</title>
</head>
<body>
  <header>
    <div class="max-lg:collapse bg-base-200 lg:mb-20 shadow-sm w-full rounded-md">
     <input id="navbar-1-toggle" class="peer hidden" type="checkbox" />
  <label for="navbar-1-toggle" class="fixed inset-0 hidden max-lg:peer-checked:block"></label>
  <div class="collapse-title navbar">
    <div class="navbar-start">
      <label for="navbar-1-toggle" class="btn btn-ghost lg:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /></svg>
      </label>
      
      <div class="w-[60px] mr-5">
         <img src="assets/github-logo.png" alt="" class="w-full h-auto">
      </div>
      

        <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
    </div>
   
    <div class="navbar-end gap-2">
      <input type="text" placeholder="Search" class="input input-bordered w-64 lg:w-auto" />
     <button class="btn btn-primary">+ New Issues</button>
    </div>
  </div>
  </header>

  <section class="bg-base-200 mr-50 ml-50 py-5 rounded pl-5 mb-2">
     <div>
                <!-- ALL -->
                <button 
                    class=" bg-white px-8 py-2 rounded-lg border cursor-pointer transition-all duration-200 hover:bg-blue-700 hover:text-white">All</button>
                <!-- interview btn -->
                <button 
                    class="bg-white px-8 py-2 rounded-lg border cursor-pointer transition-all duration-200 hover:bg-blue-700 hover:text-white">Open</button>
                <!-- reject btn -->
                <button 
                    class=" bg-white px-8 py-2 rounded-lg border cursor-pointer transition-all duration-200 hover:bg-blue-700 hover:text-white">Closed</button>
            </div>
    </section>

    <section class="bg-base-200 mr-50 ml-50 py-2 rounded pl-5 mb-2">
   <div class="navbar pr-5">
<div class="flex-1 flex items-center">
  <div class="w-[60px]">
    <img src="assets/Aperture.png" alt="">
  </div>
  <div>
      <a class="btn btn-ghost text-xl">50 Issues</a>
    <p style="color:#64748B;">Track and manage your project issues</p>
  </div>
   </div>
  <div class="flex-none">
    <ul class="menu menu-horizontal px-1 gap-5">
      <li class="">Open</li>
      <li>Closed</li>
  </ul>
  </div>
</div>
    </section>

  <section id="card-container" class="bg-base-200 mr-50 ml-50 py-2 rounded pl-5 mb-2">
     <div class="bg-white rounded-xl shadow-sm text-center py-10 px-20 space-y-4>
       <h2 class="font-semibold">hello</h2>
     <p style="color:#64748B;">Lorem, ipsum.</p>
     <div>
      <button class="btn btn-soft btn-secondary rounded-full">Secondary</button>
      <button class="btn btn-soft btn-warning rounded-full">Warning</button>
     </div>
      </div>
  </section>
  


<!-- script -->
 <script src="index.js"></script>

</body>
</html>

      </div> -->
